<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Профиленд — Найди свою профессию</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header__inner">
      <div class="logo">
        <span class="logo__icon">🏙️</span>
        <span class="logo__text">Профиленд</span>
      </div>
      <a href="test.html" class="btn btn--primary">Пройти тест 🚀</a>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="hero__content">
      <h1 class="hero__title">Профиленд</h1>
      <p class="hero__subtitle">Найди свою профессию в городе возможностей</p>
      <p class="hero__desc">Исследуй 20 районов, узнай о профессиях и пройди тест, чтобы найти свой путь!</p>
      <a href="test.html" class="btn btn--hero">Пройти тест 🚀</a>
    </div>
    <div class="hero__deco">
      <div class="star star1">⭐</div>
      <div class="star star2">✨</div>
      <div class="star star3">🌟</div>
      <div class="star star4">💫</div>
      <div class="star star5">⭐</div>
    </div>
  </section>

  <!-- CITY SECTION -->
  <section class="city">
    <h2 class="city__title">Выбери свой район</h2>
    <p class="city__subtitle">Нажми на карточку, чтобы узнать больше о профессиях</p>
    <div class="city__grid" id="cityGrid"></div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer__inner">
      <span class="footer__logo">🏙️ Профиленд</span>
      <span class="footer__copy">Твой город возможностей</span>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
