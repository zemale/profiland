<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Профиленд — Коллекция значков</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#0f0c29 0%,#302b63 50%,#24243e 100%);min-height:100vh;color:#fff;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(1px 1px at 20% 30%,rgba(255,255,255,.6) 0%,transparent 100%),radial-gradient(1px 1px at 60% 10%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1px 1px at 85% 50%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(1px 1px at 40% 80%,rgba(255,255,255,.3) 0%,transparent 100%);pointer-events:none;}

    .header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:rgba(10,8,40,.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.06);}
    .header__logo{font-size:1.2rem;font-weight:900;color:#A29BFE;text-decoration:none;}
    .header__back{font-size:.85rem;font-weight:700;color:rgba(255,255,255,.4);text-decoration:none;padding:7px 16px;border:1.5px solid rgba(255,255,255,.1);border-radius:20px;transition:all .2s;}
    .header__back:hover{color:#fff;border-color:rgba(255,255,255,.3);}

    .container{max-width:900px;margin:0 auto;padding:32px 20px 80px;position:relative;z-index:1;}

    /* ── HERO ── */
    .hero{text-align:center;margin-bottom:36px;}
    .hero__title{font-size:2rem;font-weight:900;margin-bottom:6px;}
    .hero__sub{color:rgba(255,255,255,.45);font-size:.95rem;}
    .hero__stats{display:flex;justify-content:center;gap:20px;margin-top:20px;}
    .stat{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:14px 24px;text-align:center;}
    .stat__num{font-size:1.8rem;font-weight:900;color:#A29BFE;}
    .stat__label{font-size:.72rem;color:rgba(255,255,255,.4);margin-top:2px;}

    /* ── CHALLENGE ── */
    .challenge{
      background:rgba(255,255,255,.05);
      border:1.5px solid rgba(162,155,254,.3);
      border-radius:20px;padding:20px 22px;
      margin-bottom:32px;
      position:relative;overflow:hidden;
    }
    .challenge::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(162,155,254,.08) 0%,transparent 60%);pointer-events:none;}
    .challenge__badge{font-size:.7rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#A29BFE;margin-bottom:8px;}
    .challenge__title{font-size:1.1rem;font-weight:900;margin-bottom:6px;}
    .challenge__desc{font-size:.85rem;color:rgba(255,255,255,.6);line-height:1.6;margin-bottom:14px;}
    .challenge__btn{display:inline-block;padding:10px 20px;background:linear-gradient(135deg,#A29BFE,#6C5CE7);border-radius:12px;color:#fff;font-size:.85rem;font-weight:800;text-decoration:none;transition:opacity .2s,transform .1s;}
    .challenge__btn:hover{opacity:.85;transform:scale(1.02);}
    .challenge__refresh{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.08);border:none;border-radius:8px;padding:6px 10px;color:rgba(255,255,255,.4);cursor:pointer;font-size:.8rem;transition:all .2s;}
    .challenge__refresh:hover{color:#fff;background:rgba(255,255,255,.15);}

    /* ── FILTER TABS ── */
    .filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;}
    .filter-btn{background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:20px;padding:6px 14px;color:rgba(255,255,255,.5);font-size:.78rem;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .2s;}
    .filter-btn:hover{color:#fff;border-color:rgba(255,255,255,.3);}
    .filter-btn.active{background:rgba(162,155,254,.15);border-color:#A29BFE;color:#fff;}

    /* ── BADGE GRID ── */
    .section-title{font-size:.75rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:14px;}
    .badges-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:12px;margin-bottom:32px;}

    .badge-item{
      display:flex;flex-direction:column;align-items:center;
      background:rgba(255,255,255,.04);
      border:1.5px solid rgba(255,255,255,.08);
      border-radius:16px;padding:14px 8px 10px;
      cursor:pointer;transition:all .25s;
      position:relative;
      text-align:center;
    }
    .badge-item.earned{
      background:rgba(255,255,255,.08);
      border-color:rgba(255,255,255,.2);
    }
    .badge-item.earned:hover{transform:scale(1.06) translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.4);}
    .badge-item.locked{opacity:.35;filter:grayscale(1);}
    .badge-item.locked:hover{opacity:.5;}

    .badge-item__emoji{font-size:2rem;margin-bottom:6px;transition:transform .2s;}
    .badge-item.earned:hover .badge-item__emoji{transform:scale(1.15) rotate(-5deg);}
    .badge-item__name{font-size:.65rem;font-weight:800;line-height:1.2;color:rgba(255,255,255,.7);}
    .badge-item.locked .badge-item__name{color:rgba(255,255,255,.3);}
    .badge-item__lock{position:absolute;top:6px;right:8px;font-size:.65rem;opacity:.4;}
    .badge-item__new{position:absolute;top:-4px;right:-4px;background:#ff6b6b;border-radius:50%;width:12px;height:12px;border:2px solid #0f0c29;animation:pulse-dot 1.5s ease-in-out infinite;}
    @keyframes pulse-dot{0%,100%{transform:scale(1);}50%{transform:scale(1.3);}}

    /* ── TOOLTIP ── */
    .badge-tooltip{
      position:fixed;z-index:200;
      background:#1a1540;border:1.5px solid rgba(255,255,255,.15);border-radius:16px;padding:14px 16px;
      max-width:240px;pointer-events:none;opacity:0;
      transition:opacity .2s;box-shadow:0 12px 40px rgba(0,0,0,.6);
    }
    .badge-tooltip.show{opacity:1;}
    .badge-tooltip__emoji{font-size:1.8rem;margin-bottom:6px;display:block;}
    .badge-tooltip__name{font-size:.88rem;font-weight:900;margin-bottom:4px;}
    .badge-tooltip__task{font-size:.75rem;color:rgba(255,255,255,.55);line-height:1.5;}
    .badge-tooltip__status{font-size:.72rem;font-weight:700;margin-top:8px;padding:3px 10px;border-radius:10px;display:inline-block;}
    .badge-tooltip__status.earned{background:rgba(85,239,196,.2);color:#55EFC4;}
    .badge-tooltip__status.locked{background:rgba(255,255,255,.08);color:rgba(255,255,255,.4);}

    /* ── EMPTY STATE ── */
    .empty{text-align:center;padding:40px 20px;color:rgba(255,255,255,.3);}
    .empty__emoji{font-size:3rem;margin-bottom:12px;display:block;}

    @media(max-width:600px){
      .badges-grid{grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px;}
      .badge-item{padding:10px 6px 8px;}
      .badge-item__emoji{font-size:1.6rem;}
    }
  </style>
</head>
<body>

<header class="header">
  <a href="index.html" class="header__logo">🏙️ Профиленд</a>
  <a href="index.html" class="header__back">← На главную</a>
</header>

<div class="container">
  <div class="hero">
    <h1 class="hero__title">🏅 Коллекция значков</h1>
    <p class="hero__sub">Выполняй задания — зарабатывай значки профессионала</p>
    <div class="hero__stats">
      <div class="stat"><div class="stat__num" id="earnedCount">0</div><div class="stat__label">заработано</div></div>
      <div class="stat"><div class="stat__num" id="totalCount">0</div><div class="stat__label">всего значков</div></div>
      <div class="stat"><div class="stat__num" id="districtCount">0</div><div class="stat__label">районов открыто</div></div>
    </div>
  </div>

  <!-- Daily challenge -->
  <div class="challenge" id="challengeBlock">
    <div class="challenge__badge">⚡ Челлендж для тебя</div>
    <div class="challenge__title" id="challengeTitle"></div>
    <div class="challenge__desc" id="challengeDesc"></div>
    <a class="challenge__btn" id="challengeBtn">Выполнить →</a>
    <button class="challenge__refresh" onclick="refreshChallenge()">🔄 Другой</button>
  </div>

  <!-- Filters -->
  <div class="filter-row" id="filterRow"></div>

  <!-- Sections by district -->
  <div id="badgeSections"></div>
</div>

<!-- Tooltip -->
<div class="badge-tooltip" id="tooltip">
  <span class="badge-tooltip__emoji" id="ttEmoji"></span>
  <div class="badge-tooltip__name" id="ttName"></div>
  <div class="badge-tooltip__task" id="ttTask"></div>
  <div class="badge-tooltip__status" id="ttStatus"></div>
</div>

<script>
const DISTRICT_NAMES = {
  medical:'Медицинский',social:'Социальный',creative:'Творческий',music:'Музыкальный',
  tech:'Технологический',science:'Научный',nature:'Природный',construction:'Строительный',
  business:'Деловой',media:'Медиа',culinary:'Кулинарный',transport:'Транспортный',
  military:'Силовой',sports:'Спортивный',agro:'Аграрный',education:'Образовательный',
  service:'Сервисный',tourism:'Туристический',industrial:'Промышленный',gaming:'Игровой'
};
const DISTRICT_EMOJIS = {
  medical:'🏥',social:'🧠',creative:'🎭',music:'🎵',tech:'💻',science:'🔬',
  nature:'🌿',construction:'🏗️',business:'⚖️',media:'📰',culinary:'🍳',
  transport:'✈️',military:'🛡️',sports:'⚽',agro:'🌾',education:'🎓',
  service:'💈',tourism:'🗺️',industrial:'🔧',gaming:'🎮'
};
const DISTRICT_COLORS = {
  medical:'#FF6B6B',social:'#4ECDC4',creative:'#FFE66D',music:'#A29BFE',tech:'#6C5CE7',
  science:'#00B894',nature:'#55EFC4',construction:'#FDCB6E',business:'#0984E3',media:'#E17055',
  culinary:'#FD79A8',transport:'#74B9FF',military:'#636E72',sports:'#00CEC9',agro:'#6AB04C',
  education:'#F9CA24',service:'#F0932B',tourism:'#EB4D4B',industrial:'#7F8C8D',gaming:'#9B59B6'
};

// Challenge pool — thematic based on earned badges
const CHALLENGES = [
  { title:'День в роли врача', desc:'Пройди любой сценарий в медицинском районе и узнай каково это — спасать жизни', link:'district.html?id=medical', districts:['medical'] },
  { title:'Хакатон для одного', desc:'Пройди квиз программиста — докажи что знаешь основы кода', link:'quiz.html?prof=programmer&district=tech', districts:['tech'] },
  { title:'Творческий марафон', desc:'Открой три профессии творческого района и посмотри что тебя зацепит больше', link:'district.html?id=creative', districts:['creative'] },
  { title:'Загадки природы', desc:'Пройди квиз биолога и узнай насколько хорошо ты знаешь живой мир', link:'quiz.html?prof=biologist&district=nature', districts:['nature'] },
  { title:'Большой матч', desc:'Пройди событие «Финал чемпионата» и побудь за кулисами настоящего спорта', link:'event.html?id=sports_final', districts:['sports'] },
  { title:'Кухня шеф-повара', desc:'Пройди сценарий повара — сделай правильные решения на настоящей кухне', link:'scenario.html?prof=chef', districts:['culinary'] },
  { title:'Репортаж в прямом эфире', desc:'Пройди сценарий журналиста — успей подать материал до дедлайна', link:'scenario.html?prof=journalist', districts:['media'] },
  { title:'Полёт над облаками', desc:'Пройди сценарий пилота и почувствуй ответственность за сотни людей', link:'scenario.html?prof=pilot', districts:['transport'] },
  { title:'Стройка века', desc:'Пройди квиз архитектора — докажи что знаешь как рождаются здания', link:'quiz.html?prof=architect&district=construction', districts:['construction'] },
  { title:'В лаборатории учёного', desc:'Пройди сценарий учёного и сделай настоящее открытие', link:'scenario.html?prof=scientist', districts:['science'] },
  { title:'День открытых дверей', desc:'Пройди событие в медицинском районе — экскурсия по больнице с Аней', link:'event.html?id=medical_openday', districts:['medical'] },
  { title:'Геймдизайнер за работой', desc:'Пройди сценарий геймдизайнера и создай игровую механику', link:'scenario.html?prof=game_designer', districts:['gaming'] },
  { title:'Выставка молодых', desc:'Пройди событие в творческом квартале — экскурсия по выставке с Лерой', link:'event.html?id=creative_exhibition', districts:['creative'] },
  { title:'Защита и порядок', desc:'Пройди сценарий полицейского — что бы ты сделал в сложной ситуации?', link:'scenario.html?prof=police_officer', districts:['military'] },
  { title:'Поля и урожай', desc:'Пройди квиз агронома и узнай как выращивают еду для миллионов', link:'quiz.html?prof=agronomist&district=agro', districts:['agro'] },
];

let allBadges = {};
let earned = new Set(JSON.parse(localStorage.getItem('profiland_badges') || '[]'));
let newBadges = new Set(JSON.parse(localStorage.getItem('profiland_new_badges') || '[]'));
let taskLevels = JSON.parse(localStorage.getItem('profiland_task_badges') || '{}'); // bronze/silver/gold
let activeFilter = 'all';
let challengeIdx = parseInt(localStorage.getItem('profiland_challenge_idx') || '0');

async function init() {
  const res = await fetch('data/badges.json');
  allBadges = await res.json();

  updateStats();
  renderChallenge();
  renderFilters();
  renderBadges();

  // Clear "new" marks after viewing
  setTimeout(() => {
    localStorage.setItem('profiland_new_badges', '[]');
    newBadges.clear();
  }, 3000);
}

function updateStats() {
  const total = Object.keys(allBadges).length;
  const earnedArr = [...earned];
  const districts = new Set(earnedArr.map(id => allBadges[id]?.district).filter(Boolean));
  document.getElementById('earnedCount').textContent = earned.size;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('districtCount').textContent = districts.size;
}

function renderChallenge() {
  // Pick challenge: prefer ones matching earned badge districts
  const earnedDistricts = new Set([...earned].map(id => allBadges[id]?.district).filter(Boolean));
  let pool = earnedDistricts.size > 0
    ? CHALLENGES.filter(c => c.districts.some(d => earnedDistricts.has(d)))
    : CHALLENGES;
  if (!pool.length) pool = CHALLENGES;

  const idx = challengeIdx % pool.length;
  const ch = pool[idx];
  document.getElementById('challengeTitle').textContent = ch.title;
  document.getElementById('challengeDesc').textContent = ch.desc;
  document.getElementById('challengeBtn').href = ch.link;
}

function refreshChallenge() {
  challengeIdx = (challengeIdx + 1) % CHALLENGES.length;
  localStorage.setItem('profiland_challenge_idx', challengeIdx);
  renderChallenge();
  // Animate
  const block = document.getElementById('challengeBlock');
  block.style.opacity = '0';
  block.style.transform = 'translateY(6px)';
  setTimeout(() => { block.style.opacity = '1'; block.style.transform = ''; }, 200);
  block.style.transition = 'opacity .2s, transform .2s';
}

function renderFilters() {
  const row = document.getElementById('filterRow');
  const all = document.createElement('button');
  all.className = 'filter-btn active'; all.textContent = '🏅 Все';
  all.onclick = () => setFilter('all', all);
  row.appendChild(all);

  const earnedBtn = document.createElement('button');
  earnedBtn.className = 'filter-btn'; earnedBtn.textContent = '✅ Заработанные';
  earnedBtn.onclick = () => setFilter('earned', earnedBtn);
  row.appendChild(earnedBtn);

  // District filters
  const districts = [...new Set(Object.values(allBadges).map(b => b.district))];
  districts.forEach(dist => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.dist = dist;
    btn.textContent = DISTRICT_EMOJIS[dist] + ' ' + DISTRICT_NAMES[dist];
    btn.onclick = () => setFilter(dist, btn);
    row.appendChild(btn);
  });
}

function setFilter(val, btn) {
  activeFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderBadges();
}

function renderBadges() {
  const sections = document.getElementById('badgeSections');
  sections.innerHTML = '';

  // Group by district
  const byDistrict = {};
  Object.entries(allBadges).forEach(([id, b]) => {
    if (activeFilter !== 'all' && activeFilter !== 'earned' && b.district !== activeFilter) return;
    if (activeFilter === 'earned' && !earned.has(id)) return;
    if (!byDistrict[b.district]) byDistrict[b.district] = [];
    byDistrict[b.district].push({ id, ...b });
  });

  if (Object.keys(byDistrict).length === 0) {
    sections.innerHTML = `<div class="empty"><span class="empty__emoji">🔒</span>Пока нет заработанных значков.<br>Выполняй задания чтобы открыть их!</div>`;
    return;
  }

  const trophies = JSON.parse(localStorage.getItem('profiland_trophies') || '[]');

  Object.entries(byDistrict).forEach(([dist, badges]) => {
    const section = document.createElement('div');
    section.style.marginBottom = '28px';
    const color = DISTRICT_COLORS[dist] || '#A29BFE';
    const distBadgeCount = [...earned].filter(id => allBadges[id]?.district === dist).length;
    const hasTrophy = trophies.includes(dist);
    const canApply = distBadgeCount >= 3 && !hasTrophy;

    let trophyBtn = '';
    if (hasTrophy) {
      trophyBtn = `<a href="trophy_challenge.html?district=${dist}&from=badges" style="display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#FFD700,#FFA500);color:#1a0a00;font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;text-decoration:none;margin-left:8px">🏆 Трофей получен</a>`;
    } else if (canApply) {
      trophyBtn = `<a href="trophy_challenge.html?district=${dist}&from=badges" style="display:inline-flex;align-items:center;gap:6px;background:rgba(255,215,0,.15);color:#FFD700;border:1px solid rgba(255,215,0,.4);font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;text-decoration:none;margin-left:8px;animation:pulse 2s infinite">🏆 Подать заявку</a>`;
    } else if (distBadgeCount > 0) {
      trophyBtn = `<span style="display:inline-flex;align-items:center;gap:4px;color:rgba(255,255,255,.3);font-size:11px;margin-left:8px">🔒 ещё ${3 - distBadgeCount} значка до заявки</span>`;
    }

    section.innerHTML = `<div class="section-title" style="color:${color}88;display:flex;align-items:center;flex-wrap:wrap;gap:4px">${DISTRICT_EMOJIS[dist]} ${DISTRICT_NAMES[dist]}${trophyBtn}</div>`;

    const grid = document.createElement('div');
    grid.className = 'badges-grid';

    badges.forEach(b => {
      const isEarned = earned.has(b.id);
      const isNew = newBadges.has(b.id);
      const item = document.createElement('div');
      item.className = `badge-item ${isEarned ? 'earned' : 'locked'}`;
      item.style.borderColor = isEarned ? color + '50' : '';
      const lvl = taskLevels[b.id];
      const lvlEmoji = lvl === 'gold' ? '🥇' : lvl === 'silver' ? '🥈' : lvl === 'bronze' ? '🥉' : '';
      item.innerHTML = `
        <div class="badge-item__emoji">${b.emoji}</div>
        <div class="badge-item__name">${b.name}</div>
        ${lvlEmoji ? `<div style="font-size:.75rem;margin-top:2px">${lvlEmoji}</div>` : ''}
        ${!isEarned ? '<span class="badge-item__lock">🔒</span>' : ''}
        ${isNew ? '<div class="badge-item__new"></div>' : ''}
      `;
      item.addEventListener('mouseenter', (e) => showTooltip(e, b, isEarned));
      item.addEventListener('mouseleave', hideTooltip);
      grid.appendChild(item);
    });

    section.appendChild(grid);
    sections.appendChild(section);
  });
}

// Tooltip
const tooltip = document.getElementById('tooltip');
function showTooltip(e, b, isEarned) {
  document.getElementById('ttEmoji').textContent = b.emoji;
  document.getElementById('ttName').textContent = b.name;
  document.getElementById('ttTask').textContent = '📋 ' + b.task;
  const statusEl = document.getElementById('ttStatus');
  statusEl.textContent = isEarned ? '✅ Заработан!' : '🔒 Не открыт';
  statusEl.className = `badge-tooltip__status ${isEarned ? 'earned' : 'locked'}`;
  tooltip.classList.add('show');
  moveTip(e);
}
function moveTip(e) {
  let x = e.clientX + 12, y = e.clientY + 12;
  if (x + 250 > window.innerWidth) x = e.clientX - 260;
  if (y + 140 > window.innerHeight) y = e.clientY - 150;
  tooltip.style.left = x + 'px'; tooltip.style.top = y + 'px';
}
document.addEventListener('mousemove', e => { if (tooltip.classList.contains('show')) moveTip(e); });
function hideTooltip() { tooltip.classList.remove('show'); }

init();
</script>
<script src="pet-widget.js?v=3"></script>
</body>
</html>
