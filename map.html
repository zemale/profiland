<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Профиленд — Карта</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family:'Nunito',sans-serif;
      background:#1a2a1a;
      overflow:hidden;
      height:100vh;
      cursor:grab;
    }
    body.grabbing{cursor:grabbing;}

    /* ── HUD ── */
    .hud{
      position:fixed;top:0;left:0;right:0;
      display:flex;align-items:center;justify-content:space-between;
      padding:14px 24px;
      background:rgba(10,20,10,0.85);
      backdrop-filter:blur(12px);
      border-bottom:2px solid rgba(255,255,255,0.08);
      z-index:100;
    }
    .hud__logo{font-size:1.2rem;font-weight:900;color:#7fffb2;text-decoration:none;}
    .hud__title{font-size:0.9rem;color:rgba(255,255,255,0.4);font-weight:700;}
    .hud__back{
      font-size:0.85rem;font-weight:700;color:rgba(255,255,255,0.5);
      text-decoration:none;padding:7px 16px;
      border:1.5px solid rgba(255,255,255,0.12);border-radius:20px;
      transition:all .2s;
    }
    .hud__back:hover{color:#fff;border-color:rgba(255,255,255,0.35);}
    .hud__hint{font-size:0.75rem;color:rgba(255,255,255,0.25);display:flex;align-items:center;gap:6px;}

    /* ── WORLD ── */
    #world-wrap{
      position:fixed;inset:0;top:54px;
      overflow:hidden;
    }
    #world{
      position:absolute;
      width:2400px;height:1800px;
      transform-origin:0 0;
    }

    /* Grass / terrain */
    #world{
      background:
        repeating-linear-gradient(0deg,rgba(255,255,255,0.015) 0px,rgba(255,255,255,0.015) 1px,transparent 1px,transparent 60px),
        repeating-linear-gradient(90deg,rgba(255,255,255,0.015) 0px,rgba(255,255,255,0.015) 1px,transparent 1px,transparent 60px),
        radial-gradient(ellipse at 30% 40%,#1e3d1e 0%,#152812 60%,#0f1f0f 100%);
    }

    /* ── ROADS ── */
    .road{
      position:absolute;
      background:#2d2d2d;
    }
    .road.h{height:44px;}
    .road.v{width:44px;}
    /* dashes */
    .road::after{
      content:'';
      position:absolute;
      background:repeating-linear-gradient(
        90deg,
        #ffeb3b 0,#ffeb3b 30px,
        transparent 30px,transparent 70px
      );
    }
    .road.h::after{top:50%;left:0;right:0;height:2px;transform:translateY(-50%);}
    .road.v::after{left:50%;top:0;bottom:0;width:2px;transform:translateX(-50%);
      background:repeating-linear-gradient(
        180deg,
        #ffeb3b 0,#ffeb3b 30px,
        transparent 30px,transparent 70px
      );
    }

    /* ── DISTRICT ── */
    .district{
      position:absolute;
      border-radius:16px;
      border:3px solid rgba(0,0,0,0.4);
      overflow:hidden;
      cursor:pointer;
      transition:filter .2s, transform .2s;
      box-shadow:0 4px 24px rgba(0,0,0,0.5),inset 0 0 0 1px rgba(255,255,255,0.08);
    }
    .district:hover{
      filter:brightness(1.15);
      transform:scale(1.02);
      z-index:50!important;
    }
    .district__inner{
      width:100%;height:100%;
      position:relative;
      overflow:hidden;
    }
    /* Ground texture */
    .district__ground{
      position:absolute;inset:0;
      opacity:0.15;
      background:repeating-linear-gradient(
        45deg,
        rgba(255,255,255,0.1) 0,rgba(255,255,255,0.1) 1px,
        transparent 1px,transparent 8px
      );
    }
    /* District name tag */
    .district__label{
      position:absolute;
      bottom:10px;left:0;right:0;
      text-align:center;
      font-size:0.72rem;font-weight:900;
      color:#fff;
      text-shadow:0 1px 4px rgba(0,0,0,0.9),0 0 12px rgba(0,0,0,0.8);
      letter-spacing:.5px;
      line-height:1.3;
      pointer-events:none;
    }
    /* Buildings inside district */
    .district__buildings{
      position:absolute;
      bottom:30px;left:0;right:0;
      display:flex;justify-content:center;align-items:flex-end;
      gap:4px;pointer-events:none;
    }
    .bld{
      display:flex;flex-direction:column;align-items:center;
      font-size:1.6rem;line-height:1;
      filter:drop-shadow(0 3px 6px rgba(0,0,0,0.6));
      animation:bld-idle 3s ease-in-out infinite;
    }
    .bld:nth-child(2){animation-delay:.5s;font-size:1.3rem;}
    .bld:nth-child(3){animation-delay:1s;}
    .bld:nth-child(4){animation-delay:1.5s;font-size:1.1rem;}
    .district--alive .district__inner { animation: alive-pulse 3s ease-in-out infinite; }
    @keyframes alive-pulse {
      0%,100% { filter: brightness(1); }
      50% { filter: brightness(1.15) saturate(1.2); }
    }
    .district--alive .bld { animation: bld-alive 2s ease-in-out infinite !important; }
    @keyframes bld-alive {
      0%,100%{transform:translateY(0) scale(1);}
      50%{transform:translateY(-4px) scale(1.05);}
    }
    @keyframes bld-idle{
      0%,100%{transform:translateY(0);}
      50%{transform:translateY(-3px);}
    }

    /* ── PEOPLE ── */
    .person{
      position:absolute;
      font-size:1.1rem;
      pointer-events:none;
      z-index:30;
      filter:drop-shadow(0 2px 4px rgba(0,0,0,0.6));
    }
    /* walking animation */
    @keyframes walk-right{
      0%{left:var(--x1);top:var(--y);}
      100%{left:var(--x2);top:var(--y);}
    }
    @keyframes walk-left{
      0%{left:var(--x2);top:var(--y);}
      100%{left:var(--x1);top:var(--y);}
    }
    @keyframes walk-down{
      0%{left:var(--x);top:var(--y1);}
      100%{left:var(--x);top:var(--y2);}
    }
    @keyframes walk-up{
      0%{left:var(--x);top:var(--y2);}
      100%{left:var(--x);top:var(--y1);}
    }
    @keyframes bounce{
      0%,100%{transform:translateY(0);}
      50%{transform:translateY(-3px);}
    }

    /* ── CARS ── */
    .car{
      position:absolute;
      font-size:1.3rem;
      pointer-events:none;
      z-index:25;
      filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    }

    /* ── CARD OVERLAY ── */
    #card-overlay{
      position:fixed;inset:0;
      background:rgba(0,0,0,0);
      z-index:200;
      display:none;
      align-items:center;
      justify-content:center;
      transition:background .3s;
    }
    #card-overlay.show{
      display:flex;
      background:rgba(0,0,0,0.6);
      backdrop-filter:blur(4px);
    }
    .card{
      background:#111c11;
      border-radius:24px;
      padding:32px;
      max-width:400px;
      width:90%;
      border:2px solid rgba(255,255,255,0.1);
      box-shadow:0 24px 80px rgba(0,0,0,0.8);
      transform:scale(0.85) translateY(20px);
      opacity:0;
      transition:transform .35s cubic-bezier(.34,1.56,.64,1), opacity .25s;
      position:relative;
    }
    #card-overlay.show .card{transform:scale(1) translateY(0);opacity:1;}
    .card__close{
      position:absolute;top:16px;right:16px;
      background:rgba(255,255,255,0.08);
      border:none;border-radius:50%;
      width:32px;height:32px;
      color:#fff;font-size:1rem;
      cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:background .2s;
    }
    .card__close:hover{background:rgba(255,255,255,0.18);}
    .card__emoji{font-size:3.5rem;margin-bottom:12px;display:block;text-align:center;}
    .card__name{font-size:1.4rem;font-weight:900;text-align:center;margin-bottom:6px;}
    .card__atmo{
      font-size:0.85rem;color:rgba(255,255,255,0.5);
      text-align:center;margin-bottom:16px;font-style:italic;
      line-height:1.5;
    }
    .card__profs{
      display:flex;flex-wrap:wrap;gap:6px;
      margin-bottom:20px;justify-content:center;
    }
    .card__prof{
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:12px;
      padding:4px 10px;
      font-size:0.75rem;
      color:rgba(255,255,255,0.7);
    }
    .card__btn{
      display:block;width:100%;
      padding:14px;
      border:none;border-radius:14px;
      font-size:1rem;font-weight:800;
      color:#fff;cursor:pointer;
      font-family:'Nunito',sans-serif;
      transition:opacity .2s, transform .1s;
      text-decoration:none;
      text-align:center;
    }
    .card__btn:hover{opacity:.85;transform:scale(1.02);}

    /* ── STORY CHARACTERS ── */
    .story-char{
      position:absolute;
      font-size:1.4rem;
      cursor:pointer;
      z-index:40;
      transition:transform .2s;
      filter:drop-shadow(0 2px 6px rgba(0,0,0,0.7));
      animation:char-idle 2s ease-in-out infinite;
    }
    .story-char:hover{transform:scale(1.4)!important;animation:none;}
    @keyframes char-idle{
      0%,100%{transform:translateY(0) scale(1);}
      50%{transform:translateY(-4px) scale(1.05);}
    }
    /* speech bubble above char */
    .story-char::before{
      content:'💬';
      position:absolute;
      top:-20px;left:50%;
      transform:translateX(-50%);
      font-size:0.8rem;
      opacity:0;
      transition:opacity .2s;
    }
    .story-char:hover::before{opacity:1;}

    /* ── EVENT MARKERS ── */
    .event-marker{
      position:absolute;
      z-index:60;
      cursor:pointer;
      display:flex;flex-direction:column;align-items:center;
      gap:2px;
    }
    .event-badge{
      background:linear-gradient(135deg,#ff6b35,#f7c59f);
      color:#fff;font-weight:900;font-size:0.7rem;
      padding:4px 8px;border-radius:12px;
      box-shadow:0 0 12px rgba(255,107,53,0.7);
      animation:event-pulse 1.5s ease-in-out infinite;
      white-space:nowrap;
    }
    @keyframes event-pulse{
      0%,100%{box-shadow:0 0 8px rgba(255,107,53,0.5);transform:scale(1);}
      50%{box-shadow:0 0 20px rgba(255,107,53,0.9);transform:scale(1.08);}
    }
    .event-pin{
      width:3px;height:16px;
      background:rgba(255,107,53,0.7);
      border-radius:2px;
    }

    /* ── STORY / EVENT POPUP ── */
    .popup{
      position:fixed;
      z-index:300;
      background:#0f1a10;
      border:2px solid rgba(255,255,255,0.12);
      border-radius:20px;
      padding:20px 22px;
      max-width:300px;
      width:90vw;
      box-shadow:0 16px 60px rgba(0,0,0,0.8);
      transform:scale(0.85) translateY(10px);
      opacity:0;
      transition:transform .3s cubic-bezier(.34,1.56,.64,1), opacity .2s;
      pointer-events:none;
    }
    .popup.show{
      transform:scale(1) translateY(0);
      opacity:1;
      pointer-events:all;
    }
    .popup__close{
      position:absolute;top:10px;right:12px;
      background:none;border:none;color:rgba(255,255,255,0.4);
      font-size:1.1rem;cursor:pointer;
    }
    .popup__close:hover{color:#fff;}
    .popup__emoji{font-size:2.5rem;margin-bottom:8px;display:block;}
    .popup__name{font-size:1rem;font-weight:900;margin-bottom:4px;}
    .popup__role{font-size:0.75rem;color:rgba(255,255,255,0.45);margin-bottom:10px;font-weight:700;}
    .popup__text{font-size:0.85rem;line-height:1.6;color:rgba(255,255,255,0.8);margin-bottom:14px;}
    .popup__link{
      display:inline-block;
      padding:8px 16px;
      border-radius:10px;
      font-size:0.82rem;font-weight:800;
      color:#fff;text-decoration:none;
      background:linear-gradient(135deg,#6c5ce7,#a29bfe);
      transition:opacity .2s;
    }
    .popup__link:hover{opacity:.85;}
    /* event popup accent */
    .popup.event .popup__emoji{font-size:2rem;}
    .popup.event .popup__link{
      background:linear-gradient(135deg,#ff6b35,#f7c59f);
    }

    /* mini-map */
    #minimap{
      position:fixed;bottom:20px;right:20px;
      width:140px;height:100px;
      background:rgba(0,0,0,0.7);
      border:1.5px solid rgba(255,255,255,0.12);
      border-radius:12px;
      overflow:hidden;
      z-index:100;
    }
    #minimap canvas{width:100%;height:100%;}
    #viewport-rect{
      position:absolute;
      border:1.5px solid rgba(255,255,0,0.6);
      pointer-events:none;
    }

    /* zoom controls */
    .zoom-ctrl{
      position:fixed;bottom:20px;left:20px;
      display:flex;flex-direction:column;gap:6px;
      z-index:100;
    }
    .zoom-btn{
      width:40px;height:40px;
      background:rgba(0,0,0,0.75);
      border:1.5px solid rgba(255,255,255,0.15);
      border-radius:10px;
      color:#fff;font-size:1.3rem;
      cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:background .2s;
    }
    .zoom-btn:hover{background:rgba(255,255,255,0.15);}
  </style>
</head>

<div id="minimap">

</div>

<!-- Zoom -->
<div class="zoom-ctrl">
  <button class="zoom-btn" onclick="zoom(0.15)">＋</button>
  <button class="zoom-btn" onclick="zoom(-0.15)">－</button>
</div>

// PAN & ZOOM
// ══════════════════════════════════════════
let scale = 0.6, tx = 0, ty = 0;
let isPanning = false, startX, startY, startTX, startTY;

const wrap = document.getElementById('world-wrap');

function applyTransform(){
  world.style.transform = `scale(${scale}) translate(${tx}px,${ty}px)`;
  updateMinimap();
}

// Center on load
function centerMap(){
  const ww = wrap.offsetWidth, wh = wrap.offsetHeight;
  tx = (ww/scale - 2400) / 2;
  ty = (wh/scale - 1800) / 2;
  applyTransform();
}
centerMap();

// Pan
wrap.addEventListener('mousedown', e=>{
  if(e.target.closest('.district')) return;
  isPanning=true;
  startX=e.clientX; startY=e.clientY;
  startTX=tx; startTY=ty;
  document.body.classList.add('grabbing');
});
window.addEventListener('mouseup',()=>{isPanning=false;document.body.classList.remove('grabbing');});
window.addEventListener('mousemove', e=>{
  if(!isPanning) return;
  tx = startTX + (e.clientX-startX)/scale;
  ty = startTY + (e.clientY-startY)/scale;
  applyTransform();
});

// Touch pan
let lastTouch;
wrap.addEventListener('touchstart', e=>{
  lastTouch = e.touches[0];
  startTX=tx; startTY=ty;
  startX=lastTouch.clientX; startY=lastTouch.clientY;
},{passive:true});
wrap.addEventListener('touchmove', e=>{
  const t=e.touches[0];
  tx = startTX + (t.clientX-startX)/scale;
  ty = startTY + (t.clientY-startY)/scale;
  applyTransform();
},{passive:true});

// Wheel zoom
wrap.addEventListener('wheel', e=>{
  e.preventDefault();
  const rect = wrap.getBoundingClientRect();
  const mx = (e.clientX - rect.left)/scale - tx;
  const my = (e.clientY - rect.top)/scale - ty;
  const delta = e.deltaY > 0 ? -0.08 : 0.08;
  const newScale = Math.max(0.25, Math.min(2, scale+delta));
  tx = tx - mx*(newScale/scale - 1)*(scale/newScale) + mx*(1 - newScale/scale);
  ty = ty - my*(newScale/scale - 1)*(scale/newScale) + my*(1 - newScale/scale);
  // Recalculate to keep point under cursor
  const factor = newScale/scale;
  tx = (e.clientX/scale - mx) / factor + mx - e.clientX/newScale;
  ty = (e.clientY/scale - my) / factor + my - e.clientY/newScale;
  scale = newScale;
  applyTransform();
},{passive:false});

function zoom(delta){
  scale = Math.max(0.25, Math.min(2, scale+delta));
  applyTransform();
}

function openCard(d){
  document.getElementById('cardEmoji').textContent = d.emoji;
  document.getElementById('cardName').textContent = d.name.replace('\n',' ');
  document.getElementById('cardAtmo').textContent = '✨ ' + d.atmo;
  document.getElementById('cardProfs').innerHTML = d.profs.map(p=>`<span class="card__prof">${p}</span>`).join('');
  const btn = document.getElementById('cardBtn');
  btn.textContent = `Исследовать район →`;
  btn.href = `district.html?id=${d.id}`;
  btn.style.background = d.color;
  const overlay = document.getElementById('card-overlay');
  overlay.style.display = 'flex';
  requestAnimationFrame(()=>overlay.classList.add('show'));
}
function closeCard(){
  const overlay = document.getElementById('card-overlay');
  overlay.classList.remove('show');
  setTimeout(()=>overlay.style.display='none', 300);
}
document.getElementById('card-overlay').addEventListener('click', e=>{
  if(e.target === e.currentTarget) closeCard();
});

// ── Popup logic ──
let activePopup = null;

function makePopup(){
  const p = document.createElement('div');
  p.className = 'popup';
  p.innerHTML = `<button class="popup__close" onclick="this.parentElement.remove()">✕</button>
    <span class="popup__emoji"></span>
    <div class="popup__name"></div>
    <div class="popup__role"></div>
    <div class="popup__text"></div>
    <a class="popup__link"></a>`;
  document.body.appendChild(p);
  return p;
}

function positionPopup(p, refEl){
  const rect = refEl.getBoundingClientRect();
  const pw = 300, ph = 220;
  let left = rect.right + 12;
  let top = rect.top - 10;
  if (left + pw > window.innerWidth - 10) left = rect.left - pw - 12;
  if (top + ph > window.innerHeight - 10) top = window.innerHeight - ph - 10;
  if (top < 60) top = 60;
  p.style.left = left + 'px';
  p.style.top = top + 'px';
}

function showStoryPopup(c, refEl){
  if (activePopup) activePopup.remove();
  const p = makePopup();
  p.querySelector('.popup__emoji').textContent = c.emoji;
  p.querySelector('.popup__name').textContent = c.name;
  p.querySelector('.popup__role').textContent = c.role;
  p.querySelector('.popup__text').textContent = '«' + c.story + '»';
  const lnk = p.querySelector('.popup__link');
  lnk.textContent = '🎭 Попробовать профессию';
  lnk.href = `scenario.html?prof=${c.profId}`;
  positionPopup(p, refEl);
  requestAnimationFrame(() => p.classList.add('show'));
  activePopup = p;
}

function showEventPopup(ev, refEl){
  if (activePopup) activePopup.remove();
  const p = makePopup();
  p.classList.add('event');
  p.querySelector('.popup__emoji').textContent = ev.emoji;
  p.querySelector('.popup__name').textContent = ev.title;
  p.querySelector('.popup__role').textContent = '📅 Событие этой недели';
  p.querySelector('.popup__text').textContent = ev.desc;
  const lnk = p.querySelector('.popup__link');
  lnk.textContent = '▶ Пройти событие';
  lnk.href = 'event.html?id=' + ev.id;
  positionPopup(p, refEl);
  requestAnimationFrame(() => p.classList.add('show'));
  activePopup = p;
}

// Close popup on world click
wrap.addEventListener('click', () => {
  if (activePopup) { activePopup.remove(); activePopup = null; }
});

// MINIMAP

function updateMinimap(){
  const canvas = document.getElementById('minimapCanvas');
  const ctx = canvas.getContext('2d');
  const cw=280,ch=200,ww=2400,wh=1800;
  const sx=cw/ww, sy=ch/wh;

  ctx.clearRect(0,0,cw,ch);
  ctx.fillStyle='#0f1a0f';
  ctx.fillRect(0,0,cw,ch);

  // Roads
  ctx.fillStyle='#333';
  ROADS.forEach(r=>{
    ctx.fillRect(r.x*sx,r.y*sy,r.w*sx,r.h*sy);
  });

  // Districts
  DISTRICTS.forEach(d=>{
    ctx.fillStyle=d.color+'bb';
    ctx.beginPath();
    ctx.roundRect(d.x*sx,d.y*sy,d.w*sx,d.h*sy,3);
    ctx.fill();
  });

  // Viewport rect
  const wrapW=wrap.offsetWidth, wrapH=wrap.offsetHeight;
  const vx = (-tx)*sx, vy = (-ty)*sy;
  const vw = (wrapW/scale)*sx, vh = (wrapH/scale)*sy;
  const vr = document.getElementById('viewport-rect');
  vr.style.cssText = `
    left:${vx*140/280}px;top:${vy*100/200}px;
    width:${vw*140/280}px;height:${vh*100/200}px;
  `;
}
updateMinimap();
