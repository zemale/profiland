    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      font-family:'Nunito',sans-serif;
      background:#1a2a1a;
      overflow:hidden;
      height:100vh;
      cursor:grab;
    }
    body.grabbing{cursor:grabbing;}

    /* ── HUD ── */
    .hud{
      position:fixed;top:0;left:0;right:0;
      display:flex;align-items:center;justify-content:space-between;
      padding:14px 24px;
      background:rgba(10,20,10,0.85);
      backdrop-filter:blur(12px);
      border-bottom:2px solid rgba(255,255,255,0.08);
      z-index:100;
    }
    .hud__logo{font-size:1.2rem;font-weight:900;color:#7fffb2;text-decoration:none;}
    .hud__title{font-size:0.9rem;color:rgba(255,255,255,0.4);font-weight:700;}
    .hud__back{
      font-size:0.85rem;font-weight:700;color:rgba(255,255,255,0.5);
      text-decoration:none;padding:7px 16px;
      border:1.5px solid rgba(255,255,255,0.12);border-radius:20px;
      transition:all .2s;
    }
    .hud__back:hover{color:#fff;border-color:rgba(255,255,255,0.35);}
    .hud__hint{font-size:0.75rem;color:rgba(255,255,255,0.25);display:flex;align-items:center;gap:6px;}

    /* ── WORLD ── */
    #world-wrap{
      position:fixed;inset:0;top:54px;
      overflow:hidden;
    }
    #world{
      position:absolute;
      width:2400px;height:1800px;
      transform-origin:0 0;
    }

    /* Grass / terrain */
    #world{
      background:
        repeating-linear-gradient(0deg,rgba(255,255,255,0.015) 0px,rgba(255,255,255,0.015) 1px,transparent 1px,transparent 60px),
        repeating-linear-gradient(90deg,rgba(255,255,255,0.015) 0px,rgba(255,255,255,0.015) 1px,transparent 1px,transparent 60px),
        radial-gradient(ellipse at 30% 40%,#1e3d1e 0%,#152812 60%,#0f1f0f 100%);
    }

    /* ── ROADS ── */
    .road{
      position:absolute;
      background:#2d2d2d;
    }
    .road.h{height:44px;}
    .road.v{width:44px;}
    /* dashes */
    .road::after{
      content:'';
      position:absolute;
      background:repeating-linear-gradient(
        90deg,
        #ffeb3b 0,#ffeb3b 30px,
        transparent 30px,transparent 70px
      );
    }
    .road.h::after{top:50%;left:0;right:0;height:2px;transform:translateY(-50%);}
    .road.v::after{left:50%;top:0;bottom:0;width:2px;transform:translateX(-50%);
      background:repeating-linear-gradient(
        180deg,
        #ffeb3b 0,#ffeb3b 30px,
        transparent 30px,transparent 70px
      );
    }

    /* ── DISTRICT ── */
    .district{
      position:absolute;
      border-radius:16px;
      border:3px solid rgba(0,0,0,0.4);
      overflow:hidden;
      cursor:pointer;
      transition:filter .2s, transform .2s;
      box-shadow:0 4px 24px rgba(0,0,0,0.5),inset 0 0 0 1px rgba(255,255,255,0.08);
    }
    .district:hover{
      filter:brightness(1.15);
      transform:scale(1.02);
      z-index:50!important;
    }
    .district__inner{
      width:100%;height:100%;
      position:relative;
      overflow:hidden;
    }
    /* Ground texture */
    .district__ground{
      position:absolute;inset:0;
      opacity:0.15;
      background:repeating-linear-gradient(
        45deg,
        rgba(255,255,255,0.1) 0,rgba(255,255,255,0.1) 1px,
        transparent 1px,transparent 8px
      );
    }
    /* District name tag */
    .district__label{
      position:absolute;
      bottom:10px;left:0;right:0;
      text-align:center;
      font-size:0.72rem;font-weight:900;
      color:#fff;
      text-shadow:0 1px 4px rgba(0,0,0,0.9),0 0 12px rgba(0,0,0,0.8);
      letter-spacing:.5px;
      line-height:1.3;
      pointer-events:none;
    }
    /* Buildings inside district */
    .district__buildings{
      position:absolute;
      bottom:30px;left:0;right:0;
      display:flex;justify-content:center;align-items:flex-end;
      gap:4px;pointer-events:none;
    }
    .bld{
      display:flex;flex-direction:column;align-items:center;
      font-size:1.6rem;line-height:1;
      filter:drop-shadow(0 3px 6px rgba(0,0,0,0.6));
      animation:bld-idle 3s ease-in-out infinite;
    }
    .bld:nth-child(2){animation-delay:.5s;font-size:1.3rem;}
    .bld:nth-child(3){animation-delay:1s;}
    .bld:nth-child(4){animation-delay:1.5s;font-size:1.1rem;}
    @keyframes bld-idle{
      0%,100%{transform:translateY(0);}
      50%{transform:translateY(-3px);}
    }

    /* ── PEOPLE ── */
    .person{
      position:absolute;
      font-size:1.1rem;
      pointer-events:none;
      z-index:30;
      filter:drop-shadow(0 2px 4px rgba(0,0,0,0.6));
    }
    /* walking animation */
    @keyframes walk-right{
      0%{left:var(--x1);top:var(--y);}
      100%{left:var(--x2);top:var(--y);}
    }
    @keyframes walk-left{
      0%{left:var(--x2);top:var(--y);}
      100%{left:var(--x1);top:var(--y);}
    }
    @keyframes walk-down{
      0%{left:var(--x);top:var(--y1);}
      100%{left:var(--x);top:var(--y2);}
    }
    @keyframes walk-up{
      0%{left:var(--x);top:var(--y2);}
      100%{left:var(--x);top:var(--y1);}
    }
    @keyframes bounce{
      0%,100%{transform:translateY(0);}
      50%{transform:translateY(-3px);}
    }

    /* ── CARS ── */
    .car{
      position:absolute;
      font-size:1.3rem;
      pointer-events:none;
      z-index:25;
      filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    }

    /* ── CARD OVERLAY ── */
    #card-overlay{
      position:fixed;inset:0;
      background:rgba(0,0,0,0);
      z-index:200;
      display:none;
      align-items:center;
      justify-content:center;
      transition:background .3s;
    }
    #card-overlay.show{
      display:flex;
      background:rgba(0,0,0,0.6);
      backdrop-filter:blur(4px);
    }
    .card{
      background:#111c11;
      border-radius:24px;
      padding:32px;
      max-width:400px;
      width:90%;
      border:2px solid rgba(255,255,255,0.1);
      box-shadow:0 24px 80px rgba(0,0,0,0.8);
      transform:scale(0.85) translateY(20px);
      opacity:0;
      transition:transform .35s cubic-bezier(.34,1.56,.64,1), opacity .25s;
      position:relative;
    }
    #card-overlay.show .card{transform:scale(1) translateY(0);opacity:1;}
    .card__close{
      position:absolute;top:16px;right:16px;
      background:rgba(255,255,255,0.08);
      border:none;border-radius:50%;
      width:32px;height:32px;
      color:#fff;font-size:1rem;
      cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:background .2s;
    }
    .card__close:hover{background:rgba(255,255,255,0.18);}
    .card__emoji{font-size:3.5rem;margin-bottom:12px;display:block;text-align:center;}
    .card__name{font-size:1.4rem;font-weight:900;text-align:center;margin-bottom:6px;}
    .card__atmo{
      font-size:0.85rem;color:rgba(255,255,255,0.5);
      text-align:center;margin-bottom:16px;font-style:italic;
      line-height:1.5;
    }
    .card__profs{
      display:flex;flex-wrap:wrap;gap:6px;
      margin-bottom:20px;justify-content:center;
    }
    .card__prof{
      background:rgba(255,255,255,0.06);

      border-radius:12px;
      padding:4px 10px;
      font-size:0.75rem;
      color:rgba(255,255,255,0.7);
    }
    .card__btn{
      display:block;width:100%;
      padding:14px;
      border:none;border-radius:14px;
      font-size:1rem;font-weight:800;
      color:#fff;cursor:pointer;
      font-family:'Nunito',sans-serif;
      transition:opacity .2s, transform .1s;
      text-decoration:none;
      text-align:center;
    }
    .card__btn:hover{opacity:.85;transform:scale(1.02);}

    /* mini-map */
    #minimap{
      position:fixed;bottom:20px;right:20px;

      background:rgba(0,0,0,0.7);
      border:1.5px solid rgba(255,255,255,0.12);
      border-radius:12px;
      overflow:hidden;
      z-index:100;
    }
    #minimap canvas{width:100%;height:100%;}
    #viewport-rect{

      border:1.5px solid rgba(255,255,0,0.6);

    }

    /* zoom controls */
    .zoom-ctrl{

      display:flex;flex-direction:column;gap:6px;
      z-index:100;
    }

    }

  {x:800,y:0,w:44,h:1800,type:'v'},

  {x:1520,y:0,w:44,h:1800,type:'v'},

// Animated people and cars
const WALKERS = [
  // [emoji, x1, x2, y, direction, duration]
  {emoji:'👨‍⚕️', x1:140, x2:360, y:200, dir:'h', dur:8},
  {emoji:'👩‍💻', x1:560, x2:840, y:150, dir:'h', dur:10},
  {emoji:'🏃', x1:860, x2:1080, y:780, dir:'h', dur:6},
  {emoji:'👷', x1:1220, x2:1460, y:800, dir:'h', dur:9},
  {emoji:'👨‍🌾', x1:140, x2:380, y:1120, dir:'h', dur:11},
  {emoji:'💂', x1:1220, x2:1460, y:1120, dir:'h', dur:8},
  {emoji:'👩‍🎨', x1:980, x2:1160, y:160, dir:'h', dur:7},
  {emoji:'👨‍🍳', x1:500, x2:720, y:820, dir:'h', dur:9},
  // vertical walkers
  {emoji:'🎷', x1:null, x2:null, y1:100, y2:380, x:1350, dir:'v', dur:12},
  {emoji:'🧑‍💼', x1:null, x2:null, y1:420, y2:700, x:600, dir:'v', dur:10},
  {emoji:'👩‍🔬', x1:null, x2:null, y1:420, y2:700, x:1650, dir:'v', dur:9},
  {emoji:'🚶', x1:null, x2:null, y1:760, y2:1040, x:900, dir:'v', dur:11},
];

const CARS = [
  {emoji:'🚗', x1:0, x2:2300, y:415, dur:18, flip:false},
  {emoji:'🚙', x1:2300, x2:0, y:425, dur:22, flip:true},
  {emoji:'🚕', x1:0, x2:2300, y:736, dur:20, flip:false},
  {emoji:'🚌', x1:2300, x2:0, y:746, dur:30, flip:true},
  {emoji:'🚗', x1:0, x2:2300, y:1055, dur:16, flip:false},
  {emoji:'🚑', x1:2300, x2:0, y:1065, dur:24, flip:true},
  // Vertical cars
  {emoji:'🚗', y1:0, y2:1700, x:458, dur:25, dir:'v'},
  {emoji:'🚙', y1:1700, y2:0, x:468, dur:20, dir:'v'},
  {emoji:'🚕', y1:0, y2:1700, x:818, dur:22, dir:'v'},
  {emoji:'🚗', y1:0, y2:1700, x:1178, dur:28, dir:'v'},

// ══════════════════════════════════════════
// BUILD WORLD
// ══════════════════════════════════════════
const world = document.getElementById('world');

// Roads
ROADS.forEach(r => {
  const el = document.createElement('div');
  el.className = `road ${r.type}`;
  el.style.cssText = `left:${r.x}px;top:${r.y}px;width:${r.w}px;height:${r.h}px;`;
  world.appendChild(el);
});

// Districts
DISTRICTS.forEach((d,i) => {
  const el = document.createElement('div');
  el.className = 'district';
  el.style.cssText = `
    left:${d.x}px;top:${d.y}px;width:${d.w}px;height:${d.h}px;
    background:${d.color}cc;
    z-index:${10+i};
  `;
  el.innerHTML = `
    <div class="district__inner">
      <div class="district__ground"></div>
      <div class="district__buildings">
        ${d.buildings.map(b=>`<div class="bld">${b}</div>`).join('')}
      </div>
      <div class="district__label">${d.name.replace('\n','<br>')}</div>
    </div>
  `;
  el.addEventListener('click', ()=>openCard(d));
  world.appendChild(el);
});

// Walkers
WALKERS.forEach((w,i) => {
  const el = document.createElement('div');
  el.className = 'person';
  el.textContent = w.emoji;
  const delay = (i * 1.3) % w.dur;
  if(w.dir === 'h'){
    el.style.cssText = `
      --x1:${w.x1}px;--x2:${w.x2}px;--y:${w.y}px;
      animation: walk-right ${w.dur}s ${delay}s linear infinite,
                 bounce 0.5s ease-in-out infinite;
    `;
    // Alternate direction
    if(i%2===1){
      el.style.animation = `walk-left ${w.dur}s ${delay}s linear infinite, bounce 0.5s ease-in-out infinite`;
    }
  } else {
    el.style.cssText = `
      --x:${w.x}px;--y1:${w.y1}px;--y2:${w.y2}px;
      animation: walk-down ${w.dur}s ${delay}s linear infinite,
                 bounce 0.5s ease-in-out infinite;
    `;
    if(i%2===0){
      el.style.animation = `walk-up ${w.dur}s ${delay}s linear infinite, bounce 0.5s ease-in-out infinite`;
    }
  }
  world.appendChild(el);
});

// Cars
CARS.forEach((c,i) => {
  const el = document.createElement('div');
  el.className = 'car';
  el.textContent = c.emoji;
  const delay = (i * 2.5) % c.dur;
  if(!c.dir){
    el.style.cssText = `
      --x1:${c.x1}px;--x2:${c.x2}px;--y:${c.y}px;
      animation: ${c.flip ? 'walk-left' : 'walk-right'} ${c.dur}s ${delay}s linear infinite;
      ${c.flip ? 'transform:scaleX(-1);' : ''}
    `;
  } else {
    el.style.cssText = `
      --x:${c.x}px;--y1:${c.y1}px;--y2:${c.y2}px;
      animation: walk-down ${c.dur}s ${delay}s linear infinite;
      transform:rotate(90deg);
    `;
  }
  world.appendChild(el);
});

// ══════════════════════════════════════════
// PAN & ZOOM
// ══════════════════════════════════════════
let scale = 0.6, tx = 0, ty = 0;
let isPanning = false, startX, startY, startTX, startTY;

const wrap = document.getElementById('world-wrap');

function applyTransform(){
  world.style.transform = `scale(${scale}) translate(${tx}px,${ty}px)`;
  updateMinimap();
}

// Center on load
function centerMap(){
  const ww = wrap.offsetWidth, wh = wrap.offsetHeight;
  tx = (ww/scale - 2400) / 2;
  ty = (wh/scale - 1800) / 2;
  applyTransform();
}
centerMap();

// Pan
wrap.addEventListener('mousedown', e=>{
  if(e.target.closest('.district')) return;
  isPanning=true;
  startX=e.clientX; startY=e.clientY;
  startTX=tx; startTY=ty;
  document.body.classList.add('grabbing');
});
window.addEventListener('mouseup',()=>{isPanning=false;document.body.classList.remove('grabbing');});
window.addEventListener('mousemove', e=>{
  if(!isPanning) return;
  tx = startTX + (e.clientX-startX)/scale;
  ty = startTY + (e.clientY-startY)/scale;
  applyTransform();
});

// Touch pan
let lastTouch;
wrap.addEventListener('touchstart', e=>{
  lastTouch = e.touches[0];
  startTX=tx; startTY=ty;
  startX=lastTouch.clientX; startY=lastTouch.clientY;
},{passive:true});
wrap.addEventListener('touchmove', e=>{
  const t=e.touches[0];
  tx = startTX + (t.clientX-startX)/scale;
  ty = startTY + (t.clientY-startY)/scale;
  applyTransform();
},{passive:true});

// Wheel zoom
wrap.addEventListener('wheel', e=>{
  e.preventDefault();
  const rect = wrap.getBoundingClientRect();
  const mx = (e.clientX - rect.left)/scale - tx;
  const my = (e.clientY - rect.top)/scale - ty;
  const delta = e.deltaY > 0 ? -0.08 : 0.08;
  const newScale = Math.max(0.25, Math.min(2, scale+delta));
  tx = tx - mx*(newScale/scale - 1)*(scale/newScale) + mx*(1 - newScale/scale);
  ty = ty - my*(newScale/scale - 1)*(scale/newScale) + my*(1 - newScale/scale);
  // Recalculate to keep point under cursor
  const factor = newScale/scale;
  tx = (e.clientX/scale - mx) / factor + mx - e.clientX/newScale;
  ty = (e.clientY/scale - my) / factor + my - e.clientY/newScale;
  scale = newScale;
  applyTransform();
},{passive:false});

function zoom(delta){
  scale = Math.max(0.25, Math.min(2, scale+delta));
  applyTransform();
}

// ══════════════════════════════════════════
// CARD
// ══════════════════════════════════════════
function openCard(d){
  document.getElementById('cardEmoji').textContent = d.emoji;
  document.getElementById('cardName').textContent = d.name.replace('\n',' ');
  document.getElementById('cardAtmo').textContent = '✨ ' + d.atmo;
  document.getElementById('cardProfs').innerHTML = d.profs.map(p=>`<span class="card__prof">${p}</span>`).join('');
  const btn = document.getElementById('cardBtn');
  btn.textContent = `Исследовать район →`;
  btn.href = `district.html?id=${d.id}`;
  btn.style.background = d.color;
  const overlay = document.getElementById('card-overlay');
  overlay.style.display = 'flex';
  requestAnimationFrame(()=>overlay.classList.add('show'));
}
function closeCard(){
  const overlay = document.getElementById('card-overlay');
  overlay.classList.remove('show');
  setTimeout(()=>overlay.style.display='none', 300);
}
document.getElementById('card-overlay').addEventListener('click', e=>{
  if(e.target === e.currentTarget) closeCard();
});

// ══════════════════════════════════════════
// MINIMAP
// ══════════════════════════════════════════
function updateMinimap(){
  const canvas = document.getElementById('minimapCanvas');
  const ctx = canvas.getContext('2d');
  const cw=280,ch=200,ww=2400,wh=1800;
  const sx=cw/ww, sy=ch/wh;

  ctx.clearRect(0,0,cw,ch);
  ctx.fillStyle='#0f1a0f';
  ctx.fillRect(0,0,cw,ch);

  // Roads
  ctx.fillStyle='#333';
  ROADS.forEach(r=>{
    ctx.fillRect(r.x*sx,r.y*sy,r.w*sx,r.h*sy);
  });

  // Districts
  DISTRICTS.forEach(d=>{
    ctx.fillStyle=d.color+'bb';
    ctx.beginPath();
    ctx.roundRect(d.x*sx,d.y*sy,d.w*sx,d.h*sy,3);
    ctx.fill();
  });

  // Viewport rect
  const wrapW=wrap.offsetWidth, wrapH=wrap.offsetHeight;
  const vx = (-tx)*sx, vy = (-ty)*sy;
  const vw = (wrapW/scale)*sx, vh = (wrapH/scale)*sy;
  const vr = document.getElementById('viewport-rect');
  vr.style.cssText = `
    left:${vx*140/280}px;top:${vy*100/200}px;
    width:${vw*140/280}px;height:${vh*100/200}px;
  `;
}
updateMinimap();
</script>
