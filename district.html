<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Профиленд — Район</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .district-hero {
      padding: 120px 20px 60px;
      text-align: center;
    }
    .district-hero__emoji { font-size: 5rem; margin-bottom: 16px; display: block; }
    .district-hero__title { font-size: 2.5rem; font-weight: 900; color: #fff; margin-bottom: 12px; }
    .district-hero__desc { font-size: 1.1rem; color: rgba(255,255,255,0.7); max-width: 600px; margin: 0 auto 30px; }

    .professions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 80px;
    }

    .profession-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 28px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .profession-card:hover {
      transform: translateY(-4px);
      background: rgba(255,255,255,0.1);
    }
    .profession-card__name { font-size: 1.3rem; font-weight: 800; color: #fff; margin-bottom: 10px; }
    .profession-card__desc { font-size: 0.95rem; color: rgba(255,255,255,0.7); line-height: 1.6; margin-bottom: 16px; }
    .profession-card__skills { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .skill-tag {
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.8);
    }
    .profession-card__story {
      background: rgba(255,255,255,0.05);
      border-left: 3px solid var(--accent-color, #A29BFE);
      border-radius: 0 10px 10px 0;
      padding: 12px 16px;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.65);
      line-height: 1.6;
      font-style: italic;
    }
    .profession-card__education {
      margin-top: 14px;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
    }
    .profession-card__education span { color: var(--accent-color, #A29BFE); font-weight: 700; }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      padding: 12px 24px;
      border-radius: 50px;
      background: rgba(255,255,255,0.08);
      transition: all 0.2s;
      margin: 30px 20px 0;
      display: inline-block;
    }
    .back-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }

    .section-title {
      text-align: center;
      font-size: 1.8rem;
      font-weight: 800;
      color: #fff;
      margin: 0 0 40px;
    }

    /* ── TABS ── */
    .prof-tabs {
      display: flex; gap: 6px; margin: 14px 0 0;
      border-bottom: 1.5px solid rgba(255,255,255,0.08);
      padding-bottom: 0;
    }
    .prof-tab {
      background: none; border: none;
      border-bottom: 2.5px solid transparent;
      margin-bottom: -1.5px;
      padding: 7px 12px;
      color: rgba(255,255,255,0.4); font-size: 0.78rem; font-weight: 700;
      cursor: pointer; font-family: 'Nunito', sans-serif;
      transition: all .2s;
    }
    .prof-tab:hover { color: rgba(255,255,255,0.7); }
    .prof-tab.active { color: #fff; border-bottom-color: var(--accent-color, #A29BFE); }

    /* ── ROADMAP ── */
    .roadmap { display: flex; flex-direction: column; gap: 10px; padding: 12px 0 4px; }
    .roadmap-step {
      background: rgba(255,255,255,0.04);
      border-left: 3px solid var(--accent-color, #A29BFE);
      border-radius: 0 10px 10px 0;
      padding: 10px 14px;
    }
    .roadmap-step__age { font-size: 0.72rem; font-weight: 800; color: var(--accent-color, #A29BFE); margin-bottom: 2px; }
    .roadmap-step__title { font-size: 0.88rem; font-weight: 800; margin-bottom: 6px; }
    .roadmap-step__list { padding-left: 16px; display: flex; flex-direction: column; gap: 3px; }
    .roadmap-step__list li { font-size: 0.78rem; color: rgba(255,255,255,0.65); line-height: 1.5; }

    /* ── MYTHS ── */
    .myths-list { display:flex; flex-direction:column; gap:8px; padding:12px 0 4px; }
    .myth-card {
      background:rgba(255,255,255,.04); border-radius:12px;
      padding:12px 14px; cursor:pointer;
      border:1.5px solid rgba(255,255,255,.07);
      transition:border-color .2s;
    }
    .myth-card:hover { border-color:rgba(255,255,255,.18); }
    .myth-card.revealed { cursor:default; }
    .myth-badge { font-size:.65rem; font-weight:800; letter-spacing:1px; text-transform:uppercase; color:rgba(255,255,255,.3); display:block; margin-bottom:5px; }
    .myth-text { font-size:.85rem; font-weight:700; line-height:1.5; }
    .myth-answer { margin-top:8px; padding-top:8px; border-top:1px solid rgba(255,255,255,.08); animation:fadeIn .3s ease; }
    .myth-verdict { font-size:.8rem; font-weight:900; padding:3px 10px; border-radius:8px; display:inline-block; margin-bottom:6px; }
    .myth-verdict.true { background:rgba(85,239,196,.2); color:#55EFC4; }
    .myth-verdict.false { background:rgba(255,107,107,.2); color:#FF6B6B; }
    .myth-explanation { font-size:.78rem; color:rgba(255,255,255,.6); line-height:1.55; }

    /* ── MOVIES ── */
    .movies-list { display:flex; flex-direction:column; gap:8px; padding:12px 0 4px; }
    .movie-card { background:rgba(255,255,255,.04); border-radius:12px; padding:12px 14px; border:1.5px solid rgba(255,255,255,.07); }
    .movie-card__head { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:4px; }
    .movie-card__title { font-size:.88rem; font-weight:800; }
    .movie-year { color:rgba(255,255,255,.35); font-weight:600; font-size:.78rem; }
    .movie-type { font-size:.65rem; font-weight:800; background:rgba(255,255,255,.08); padding:2px 8px; border-radius:8px; color:rgba(255,255,255,.5); white-space:nowrap; }
    .movie-realism { font-size:.8rem; margin-bottom:5px; color:rgba(255,255,255,.5); }
    .movie-realism span { font-size:.7rem; margin-left:4px; }
    .movie-desc { font-size:.78rem; color:rgba(255,255,255,.6); line-height:1.55; }

    /* ── Q&A ── */
    .qa-list { display: flex; flex-direction: column; gap: 6px; padding: 12px 0 4px; }
    .qa-item { border-radius: 10px; overflow: hidden; background: rgba(255,255,255,0.04); }
    .qa-q {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px; cursor: pointer;
      font-size: 0.82rem; font-weight: 700;
      transition: background .2s;
    }
    .qa-q:hover { background: rgba(255,255,255,0.06); }
    .qa-arrow { transition: transform .25s; font-size: 0.7rem; opacity: .5; }
    .qa-item.open .qa-arrow { transform: rotate(180deg); }
    .qa-a {
      max-height: 0; overflow: hidden;
      font-size: 0.82rem; line-height: 1.65;
      color: rgba(255,255,255,0.65);
      transition: max-height .35s ease, padding .25s;
      padding: 0 14px;
    }
    .qa-item.open .qa-a { max-height: 300px; padding: 0 14px 12px; }
  </style>
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <a href="index.html" class="logo" style="text-decoration:none">
        <span class="logo__icon">🏙️</span>
        <span class="logo__text">Профиленд</span>
      </a>
      <a href="test.html" class="btn btn--primary">Пройти тест 🚀</a>
    </div>
  </header>

  <a href="index.html" class="back-btn">← Все районы</a>

  <div class="district-hero" id="districtHero">
    <span class="district-hero__emoji" id="districtEmoji"></span>
    <h1 class="district-hero__title" id="districtTitle"></h1>
    <p class="district-hero__desc" id="districtDesc"></p>
  </div>

  <div style="max-width:1200px;margin:0 auto;padding:0 20px;">
    <h2 class="section-title">Профессии района</h2>
  </div>
  <div class="professions-grid" id="professionsGrid"></div>

  <footer class="footer">
    <div class="footer__inner">
      <span class="footer__logo">🏙️ Профиленд</span>
      <span class="footer__copy">Твой город возможностей</span>
    </div>
  </footer>

  <script>
    async function init() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');

      const [res, scenRes, quizRes, qaRes, rmRes, mythsRes, moviesRes, taskRes] = await Promise.all([
        fetch('data/professions.json'),
        fetch('data/scenarios.json'),
        fetch('data/quizzes.json'),
        fetch('data/qa.json').catch(()=>({json:()=>({})})),
        fetch('data/roadmap.json').catch(()=>({json:()=>({})})),
        fetch('data/myths.json').catch(()=>({json:()=>({})})),
        fetch('data/movies.json').catch(()=>({json:()=>({})})),
        fetch('data/tasks.json').catch(()=>({json:()=>({tasks:{}})}))
      ]);
      const data = await res.json();
      const scenData = await scenRes.json();
      const quizData = await quizRes.json();
      const qaData = await qaRes.json();
      const rmData = await rmRes.json();
      const mythsData = await mythsRes.json();
      const moviesData = await moviesRes.json();
      const taskData = await taskRes.json();
      const availableScenarios = Object.keys(scenData.scenarios);
      const availableQuizzes = Object.keys(quizData.quizzes);
      const availableTasks = Object.keys(taskData.tasks || {});
      // Master badge check
      const taskBadgesLS = JSON.parse(localStorage.getItem('profiland_task_badges') || '{}');
      const quizDoneLS = new Set(JSON.parse(localStorage.getItem('profiland_quiz_done') || '[]'));
      const scenDoneLS = new Set(JSON.parse(localStorage.getItem('profiland_scenario_done') || '[]'));
      const masterBadgesLS = new Set(JSON.parse(localStorage.getItem('profiland_master_badges') || '[]'));
      function isMaster(profId) {
        const isMaster = taskBadgesLS[profId] && quizDoneLS.has(profId) && scenDoneLS.has(profId);
        if(isMaster && !masterBadgesLS.has(profId)) {
          masterBadgesLS.add(profId);
          localStorage.setItem('profiland_master_badges', JSON.stringify([...masterBadgesLS]));
        }
        return isMaster;
      }
      const district = data.districts.find(d => d.id === id);

      if (!district) {
        document.body.innerHTML = '<div style="color:#fff;text-align:center;padding:100px">Район не найден</div>';
        return;
      }

      document.title = `Профиленд — ${district.name}`;
      document.getElementById('districtEmoji').textContent = district.emoji;
      document.getElementById('districtTitle').textContent = district.name + ' район';
      document.getElementById('districtDesc').textContent = district.description;
      document.documentElement.style.setProperty('--accent-color', district.color);

      const grid = document.getElementById('professionsGrid');
      district.professions.forEach((prof, i) => {
        const card = document.createElement('div');
        card.className = 'profession-card';
        card.style.borderTopColor = district.color;
        card.style.borderTopWidth = '3px';
        card.innerHTML = `
          <div class="profession-card__name">${prof.name}${isMaster(prof.id) ? ' <span title="Мастер профессии" style="font-size:1rem">⭐</span>' : ''}</div>
          <div class="profession-card__desc">${prof.description}</div>
          <div class="profession-card__skills">
            ${prof.skills.map(s => `<span class="skill-tag">⚡ ${s}</span>`).join('')}
          </div>
          <div class="profession-card__story">💬 ${prof.story}</div>

          <!-- Tabs -->
          <div class="prof-tabs" id="tabs-${prof.id}">
            <button class="prof-tab active" onclick="switchTab('${prof.id}','actions',this)">🎮 Попробовать</button>
            ${rmData[prof.id] ? `<button class="prof-tab" onclick="switchTab('${prof.id}','roadmap',this)">🗺️ Путь</button>` : ''}
            ${qaData[prof.id] ? `<button class="prof-tab" onclick="switchTab('${prof.id}','qa',this)">💬 Спроси</button>` : ''}
            ${mythsData[prof.id] ? `<button class="prof-tab" onclick="switchTab('${prof.id}','myths',this)">🎭 Мифы</button>` : ''}
            ${moviesData[prof.id] ? `<button class="prof-tab" onclick="switchTab('${prof.id}','movies',this)">🎬 Кино</button>` : ''}
          </div>

          <!-- Tab: actions -->
          <div class="prof-tab-panel" id="tab-${prof.id}-actions">
            <div style="display:flex;gap:8px;flex-wrap:wrap;padding:12px 0 4px">
              ${availableScenarios.includes(prof.id) ? `<a href="scenario.html?prof=${prof.id}" class="btn btn--primary" style="flex:1;min-width:120px;text-align:center;text-decoration:none;font-size:0.85rem;padding:9px 12px" onclick="event.stopPropagation()">🎮 Попробовать себя</a>` : ''}
              ${availableQuizzes.includes(prof.id) ? `<a href="quiz.html?prof=${prof.id}&district=${district.id}" class="btn" style="flex:1;min-width:120px;text-align:center;text-decoration:none;font-size:0.85rem;padding:9px 12px;background:#fff;color:${district.color};border:2px solid ${district.color};border-radius:25px;font-weight:700" onclick="event.stopPropagation()">🧠 Проверь знания</a>` : ''}
              ${availableTasks.includes(prof.id) ? `<a href="task.html?prof=${prof.id}&district=${district.id}" class="btn" style="flex:1;min-width:120px;text-align:center;text-decoration:none;font-size:0.85rem;padding:9px 12px;background:linear-gradient(135deg,#FDCB6E,#e17055);color:#fff;border-radius:25px;font-weight:700;border:none" onclick="event.stopPropagation()">🎯 Задание</a>` : ''}
            </div>
          </div>

          <!-- Tab: roadmap -->
          ${rmData[prof.id] ? `
          <div class="prof-tab-panel" id="tab-${prof.id}-roadmap" style="display:none">
            <div class="roadmap">
              ${rmData[prof.id].roadmap.map(step => `
                <div class="roadmap-step">
                  <div class="roadmap-step__age">${step.icon} ${step.age}</div>
                  <div class="roadmap-step__title">${step.title}</div>
                  <ul class="roadmap-step__list">
                    ${step.steps.map(s=>`<li>${s}</li>`).join('')}
                  </ul>
                </div>
              `).join('')}
            </div>
          </div>` : ''}

          <!-- Tab: Q&A -->
          ${qaData[prof.id] ? `
          <div class="prof-tab-panel" id="tab-${prof.id}-qa" style="display:none">
            <div class="qa-list">
              ${qaData[prof.id].qa.map((item,qi) => `
                <div class="qa-item">
                  <div class="qa-q" onclick="toggleQA(this)">
                    <span>${item.q}</span><span class="qa-arrow">▼</span>
                  </div>
                  <div class="qa-a">${item.a}</div>
                </div>
              `).join('')}
            </div>
          </div>` : ''}

          <!-- Tab: myths -->
          ${mythsData[prof.id] ? `
          <div class="prof-tab-panel" id="tab-${prof.id}-myths" style="display:none">
            <div class="myths-list">
              ${mythsData[prof.id].myths.map((m,mi) => `
                <div class="myth-card" id="myth-${prof.id}-${mi}" onclick="revealMyth('${prof.id}',${mi})">
                  <div class="myth-question">
                    <span class="myth-badge">🤔 Правда или миф?</span>
                    <div class="myth-text">${m.text}</div>
                  </div>
                  <div class="myth-answer" style="display:none">
                    <span class="myth-verdict ${m.isTrue ? 'true' : 'false'}">${m.isTrue ? '✅ Правда!' : '❌ Миф!'}</span>
                    <div class="myth-explanation">${m.explanation}</div>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>` : ''}

          <!-- Tab: movies -->
          ${moviesData[prof.id] ? `
          <div class="prof-tab-panel" id="tab-${prof.id}-movies" style="display:none">
            <div class="movies-list">
              ${moviesData[prof.id].movies.map(mv => `
                <div class="movie-card">
                  <div class="movie-card__head">
                    <div class="movie-card__title">${mv.title} <span class="movie-year">${mv.year}</span></div>
                    <div class="movie-type">${mv.type}</div>
                  </div>
                  <div class="movie-realism">${'⭐'.repeat(mv.realism)}${'☆'.repeat(5-mv.realism)} <span>реализм</span></div>
                  <div class="movie-desc">${mv.desc}</div>
                </div>
              `).join('')}
            </div>
          </div>` : ''}

          <div class="profession-card__education">📚 Где учиться: <span>${prof.education.join(', ')}</span></div>
        `;
        setTimeout(() => {
          card.style.opacity = '0';
          card.style.transform = 'translateY(20px)';
          card.style.transition = 'all 0.4s ease';
          grid.appendChild(card);
          setTimeout(() => {
            card.style.opacity = '1';
            card.style.transform = 'translateY(0)';
          }, i * 80 + 50);
        }, 0);
      });
    }

    init();

    function switchTab(profId, tab, btn) {
      document.querySelectorAll(`#tabs-${profId} .prof-tab`).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll(`[id^="tab-${profId}-"]`).forEach(p => p.style.display = 'none');
      const panel = document.getElementById(`tab-${profId}-${tab}`);
      if (panel) panel.style.display = 'block';
    }

    function toggleQA(el) {
      const item = el.parentElement;
      item.classList.toggle('open');
    }

    function revealMyth(profId, idx) {
      const card = document.getElementById(`myth-${profId}-${idx}`);
      if (!card) return;
      const answer = card.querySelector('.myth-answer');
      const question = card.querySelector('.myth-question');
      if (answer.style.display === 'none') {
        answer.style.display = 'block';
        card.classList.add('revealed');
        question.style.opacity = '0.5';
      }
    }
  </script>
</body>
</html>
